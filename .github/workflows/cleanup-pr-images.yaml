name: Cleanup PR Images

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-24.04

    permissions:
      packages: write
      contents: read

    steps:
      - name: Delete PR images from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPOSITORY: test_tools_image
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          PREFIX="pr-${PR_NUMBER}-"
          ids_file=$(mktemp)

          echo "Collecting images with tag prefix: ${PREFIX}"
          echo "Also collecting untagged versions..."

          page=1
          while true; do
            echo "Fetching page ${page}..."

            response=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${ORG}/packages/container/${REPOSITORY}/versions?per_page=100&page=${page}")

            count=$(echo "$response" | jq length)

            if [ "$count" -eq 0 ]; then
              echo "No more versions found."
              break
            fi

            echo "$response" | jq -r \
              --arg PREFIX "$PREFIX" '
              .[] |
              select(
                (
                  (.metadata.container.tags // []) 
                  | any(startswith($PREFIX))
                )
                or
                (
                  (
                    (.metadata.container.tags == null) 
                    or 
                    (.metadata.container.tags | length == 0)
                  )
                  and
                  (
                    (.created_at | fromdateiso8601) < (now - 7*24*60*60)
                  )
                )
              ) |
              .id
              ' >> "$ids_file"

            page=$((page + 1))
          done

          if [ ! -s "$ids_file" ]; then
            echo "No matching versions found."
            exit 0
          fi

          sort -u "$ids_file" -o "$ids_file"

          total=$(wc -l < "$ids_file")
          echo "Found $total versions to delete."

          while read -r id; do
            echo "Deleting version ID: $id"
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${ORG}/packages/container/${REPOSITORY}/versions/$id" \
              || echo "Warning: Failed to delete version $id"
          done < "$ids_file"

          echo "Cleanup complete."
          echo "Deleted $total images."
