name: Update build image

run-name: Update build image to ${{ inputs.tag }} as ${{ inputs.latest_tag }}

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag in the format short-commit-<sha>'
        required: true
        type: string
      latest_tag:
        description: 'Tag image as latest or dev_latest'
        required: true
        default: dev_latest
        type: choice
        options:
        - latest
        - dev_latest
  push:
    branches:
      - master
    paths:
      - 'docker/build/Dockerfile'
      
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kanisterio/build

jobs:
  build:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest
    # TODO: Uncomment following when we enable check-file job
    # needs: check-files
    # if: needs.check-files.outputs.changed == 'true'
    steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Image metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          {{date 'YYYY.MM.DD-HHmm'}}
          type=sha,prefix=commit-
          type=sha,prefix=short-commit-,format=short,length=12,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=raw,value=v9.99.9-dev,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          type=raw,value=${{ inputs.latest_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
    - name: Login to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: "{{defaultContext}}:docker/build"
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
