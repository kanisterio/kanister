name: Update build image

run-name: Update build image to ${{ inputs.tag }} as ${{ inputs.latest_tag }}

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag in the format short-commit-<sha>'
        required: true
        type: string
      latest_tag:
        description: 'Tag image as latest or dev_latest'
        required: true
        default: dev_latest
        type: choice
        options:
        - latest
        - dev_latest
  push:
    branches:
      - master
    paths:
      - 'docker/build/Dockerfile'
      
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kanisterio/build

jobs:
  build:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    # TODO: Uncomment following when we enable check-file job
    # needs: check-files
    # if: needs.check-files.outputs.changed == 'true'
    steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Image metadata
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          {{date 'YYYY.MM.DD-HHmm'}}
          type=sha,prefix=commit-
          type=sha,prefix=short-commit-,format=short,length=12,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=raw,value=latest,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=raw,value=v9.99.9-dev,enable=${{ github.event_name != 'workflow_dispatch' }}
          type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          type=raw,value=${{ inputs.latest_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
    - name: Login to GHCR
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: "{{defaultContext}}:docker/build"
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
